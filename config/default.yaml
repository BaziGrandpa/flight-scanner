    base_url: https://test.api.amadeus.com
    api_key: Paste your Amadeus API key here
    api_secret: Paste your Amadeus API secret here
    api_key_env: AMADEUS_API_KEY
    api_secret_env: AMADEUS_API_SECRET
  trip:
    enabled: true
    currency_hint: USD

data:
  db_path: data/flight_scanner.db
  report_dir: data/reports
  latest_report_name: latest_summary.md
  log_dir: data/logs
