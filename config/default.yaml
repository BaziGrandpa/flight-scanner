origins:
  - GOT
  - CPH

destinations:
  - HKG
  - PVG
  - HND

departure_window:
  start: 2026-06-18
  end: 2026-06-25

trip_length_days:
  min: 30
  max: 45

search:
  max_api_queries: 24
  cheapest_seed_count: 2
